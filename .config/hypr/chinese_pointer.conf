bind = SUPER SHIFT, W, exec, mpv --background=none /home/sergej/GitHub/dotfiles/assets/arrow.mov
windowrule=no_blur on,match:class ^(mpv)$,match:title ^(arrow.mov).*
windowrule=no_anim on,match:class ^(mpv)$,match:title ^(arrow.mov).*
windowrule=no_focus on,match:class ^(mpv)$,match:title ^(arrow.mov).*
windowrule=decorate off,match:class ^(mpv)$,match:title ^(arrow.mov).*
windowrule=float on,match:class ^(mpv)$,match:title ^(arrow.mov).*
windowrule=size 256 144,match:class ^(mpv)$,match:title ^(arrow.mov).*
windowrule=move (cursor_x-window_w*0.5) (cursor_y-window_h*0.5),match:class ^(mpv)$,match:title ^(arrow.mov).*
